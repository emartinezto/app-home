services:
  mysql:
    image: mysql:8.4
    container_name: casa-garcia-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: casa_garcia
      MYSQL_USER: casa_garcia
      MYSQL_PASSWORD: changeme
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - casa-garcia-mysql-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "casa_garcia", "-pchangeme"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  casa-garcia-mysql-data:
